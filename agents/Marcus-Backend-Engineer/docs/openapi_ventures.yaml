openapi: 3.0.3
info:
  title: Ventures API
  version: 1.0.0
servers:
  - url: https://api.example.com/api/v1
paths:
  /ventures:
    get:
      summary: List ventures
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VentureListResponse'
  /ventures/{id}:
    get:
      summary: Get venture by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Venture'
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login success
          headers:
            Set-Cookie:
              description: refresh_token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
  /files/upload-presign:
    post:
      summary: Create upload presigned URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadPresignRequest'
      responses:
        '200':
          description: Presign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadPresignResponse'
  /files/{file_id}/download-presign:
    post:
      summary: Create download presigned URL
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: file_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ttl:
                  type: integer
                  description: requested TTL in seconds
      responses:
        '200':
          description: Download presign
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadPresignResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    VentureListResponse:
      type: object
      properties:
        meta:
          type: object
          properties:
            page:
              type: integer
            size:
              type: integer
            total:
              type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/VentureSummary'
    VentureSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft,published,archived]
        thumbnail_url:
          type: string
          nullable: true
        owner_id:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
    Venture:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [draft,published,archived]
        description:
          type: string
          nullable: true
        owner_id:
          type: string
          format: uuid
        tags:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileMeta'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FileMeta:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        name:
          type: string
        size:
          type: integer
        content_type:
          type: string
        uploaded_at:
          type: string
          format: date-time
        download_presign_expires_in:
          type: integer
    AuthLoginResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [admin,owner,editor,viewer]
    UploadPresignRequest:
      type: object
      properties:
        file_name:
          type: string
        content_type:
          type: string
        size:
          type: integer
        sensitivity:
          type: string
          enum: [public,internal,sensitive]
    UploadPresignResponse:
      type: object
      properties:
        upload_id:
          type: string
        method:
          type: string
        url:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        fields:
          type: object
          additionalProperties:
            type: string
        expires_in:
          type: integer
    DownloadPresignResponse:
      type: object
      properties:
        file_id:
          type: string
          format: uuid
        url:
          type: string
        expires_in:
          type: integer
        content_type:
          type: string
        disposition:
          type: string
